services:
  api-gateway:
    build: ./gateway/api-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - auth-service
    networks:
      - platform-network

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform-network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_pass}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

volumes:
  pgdata:

networks:
  platform-network:
    driver: bridge
